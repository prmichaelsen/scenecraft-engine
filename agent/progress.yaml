recent_work:
  - date: 2026-04-24
    description: "`bounce_audio` chat tool shipped — renders a WAV bounce (full timeline / track subset / clip subset) and serves it for download. New audio_bounces table (content-addressable by composite_hash over mix_graph_hash + selection + format), compute_bounce_hash helper, POST /bounce-upload + GET /bounces/<id>.wav endpoints. Frontend: encodePCMToWav now supports 16/24/32-float (wFormatTag 0x0001 for PCM, 0x0003 for float); handleBounceAudioRequest filters tracks/clips per the selection and POSTs to bounce-upload. 45 new tests (24 backend + 21 frontend), byte-level format verification, round-trip error ≤ 1/8388608 for 24-bit, exact for 32-float. 79/79 bounce+master-bus+analyze regression tests green."
  - date: 2026-04-24
    description: "Master-bus effect chain shipped end-to-end. Backend: track_effects.track_id relaxed to nullable via in-place PRAGMA-detected migration; add_master_bus_effect / remove_master_bus_effect chat tools with WS emit {type: master_bus_effects_changed} on mutation; GET /api/projects/:name/master-bus-effects endpoint. Frontend: masterGain → masterFxChain → masterAnalyser → destination (shared buildEffectChain in mix-graph.ts → live + offline bit-identical); real fetchMasterBusEffects; WS handler via window CustomEvent bus to useAudioMixer.reevaluateMasterChain. Solves the '11 stacked track limiters distort' problem — single master limiter is the pro-audio standard fix."
  - date: 2026-04-24
    description: "M15 fully shipped end-to-end (9 tasks) — AudioBuffer mixer migration (HTMLAudioElement → AudioBufferSourceNode) + renderMixToBuffer OfflineAudioContext primitive (fidelity 1.48e-8 max abs diff) + mix analysis schema (mix_analysis_runs, mix_datapoints, mix_sections, mix_scalars) + mix_graph_hash + mix-render-upload endpoint + analyze_master_bus chat tool (pyloudnorm + librosa, cached) + full WS render round-trip (backend emits mix_render_request, frontend renders+uploads, asyncio.Event releases the waiting coroutine) + end-to-end integration test + live-vs-offline fidelity test (max abs diff = 0 — bit-identical parity across 5 scenarios). Principle locked in memory: frontend WebAudio is audio source of truth; any mix analysis or export MUST render via OfflineAudioContext cloning the playback graph. Test coverage: 131+ tests across mix/master/analyze surfaces."
  - date: 2026-04-24
    description: "M16 planned (TDD mode) — FastAPI Migration + OpenAPI-Driven Tool Codegen. 12 tasks (T57-T68) totaling ~54-72 dev hours across 2 phases. Phase A (T57-T65): port 164 routes from hand-rolled api_server.py to FastAPI/uvicorn, preserve auth/streaming/Range/CORS/plugin-catchall/structural-lock behavior, hard cut (no feature flag), WS stays independent on 8891. Phase B (T66-T68): scripts/gen_chat_tools.py reads openapi.json, filters x-tool:true operations, emits src/scenecraft/chat_tools_generated.py replacing ~1000 LOC of hand-written tool schemas in chat.py. Source: two specs shipped 2026-04-24 (local.fastapi-migration 35R/60 behavior rows; local.openapi-tool-codegen 30R/37 behavior rows). Each task lists named tests it covers — tests-first ordering. 897-test suite is the migration confidence anchor; only 11 test files touch HTTP directly."
  - date: 2026-04-24
    description: "Two specs created proofing the next milestone (2026-04-24): agent/specs/local.fastapi-migration.md (replace api_server.py with FastAPI/uvicorn, preserving 164 routes byte-for-byte; hard cut) and agent/specs/local.openapi-tool-codegen.md (scripts/gen_chat_tools.py emits chat_tools_generated.py from openapi.json x-tool annotations; replaces 32 hand-written tool dicts in chat.py). Single open decision: chat tool execution path (OQ-1) — recommendation (a) in-process + parity test, with (b) ASGI round-trip and (c) extracted service layer as alternatives. Commit: ae151a0."
  - date: 2026-04-23
    description: "M13 DISCOVERED COMPLETE on main — 12/12 tasks (45-56) already merged across scenecraft-engine (45, 52, 56) and scenecraft frontend (46, 47, 48, 49, 50, 51, 53, 54, 55, 56). progress.yaml was stale; corrected. Implications: all Phase 2 chat-audio tool blockers satisfied — add_audio_effect, update_volume_curve, update_effect_param_curve can all ship now without waiting."
  - date: 2026-04-23
    description: "Chat-agent audio authoring tools Phase 1 shipped. chat.py: add_audio_track (auto id/display_order/name, initial volume -> constant volume_curve, one undo group) + add_audio_clip (source by pool_segments.id uuid, start_time required, trim_in/trim_out preferred with source_offset/end_time as lower-level alternates, end_time auto-computed from pool_segments.duration_seconds when omitted, label seeded from pool segment). Both wrap in undo_begin — trigger-based undo-log captures inverse SQL automatically. No DB schema changes; reuses existing db.add_audio_track/add_audio_clip/get_pool_segment/get_audio_tracks/generate_id."
  - date: 2026-04-23
    description: "Design/local.chat-audio-tools.md created — two-phase plan for chat-agent audio write-path. Phase 1 (tracks+clips) shipped same day. Phase 2 revised post-design: update_volume_curve can ship NOW (inline column, no M13 dep); update_effect_param_curve waits on M13 task 45; add_audio_effect waits on tasks 45+46 (registry for effect_type enum). Primitives-only (no compound ops) for undo granularity."
  - date: 2026-04-23
    description: "Clarification-8 (AI rotoscope plugin / M14 scoping) ~95% complete. Decisions locked: SAM2 single-subject + refinement + box-prompt MVP; matte-only default with opt-in clip-mask layer effect (per-frame editable contours + feather + grow + invert); temporal alignment via DTW-along-contour-arclength IN MVP; per-frame override semantics; multi-backend inference (local + shared_worker + cloud_api P1, all configurable); hard-GPU requirement (no CPU fallback); candidate pattern (no auto-apply); net-new alpha_source compositor plumbing (~2-3 days prereq); independent of M13; M14 = next up; revised estimate 3-4 weeks. Spike-first (2-day SAM2 quality validation) accepted."
  - date: 2026-04-23
    description: "M13 planned — Effect Curves + Macro Panel + Touch-Record. 12 tasks (45-56) spanning DB schema, effect registry (15 types across 6 P0 categories: Dynamics/EQ/Spatial/Time/Modulation/Distortion), audio graph + send buses + IR assets, curve scheduling, effect implementations (split by category), HTTP endpoints, inline curve editor extraction, MacroPanel UI (grid+list, knobs), touch-record state machine, P2 copy-paste automation. Source: clarification-7 → design → spec (54 requirements, 29 named tests). ~2 weeks, ~70 dev hours."
  - date: 2026-04-23
    description: "M12 COMPLETE — NLE-style preview rendering pipeline shipped. 6/6 tasks done (39 proxies, 40 fragment cache, 41 background renderer, 42 render-state tracking, 43 Timeline state-bar UI, 44 chunked proxies). Preview model shifted from 'render realtime from source' to 'proxies + background cache + render-state bar'. Stutter eliminated at 1080p."
  - date: 2026-04-22
    description: "M12 task-44 complete — chunked proxies. proxy_generator.py gains Manifest dataclass + chunked_proxy_dir_for/_manifest, chunk_for_time, generate_chunked_proxy (ffmpeg segment muxer with forced keyframes + atomic tmp-dir rename). ProxyCoordinator.ensure_proxy(mode='auto'|'single'|'chunked') auto-picks chunked for sources ≥ chunk_seconds (default 300s). Compositor: _resolve_source_for_read now returns (file_path, t_file_offset); _get_frame_at computes idx_in_file = (t_in_source - offset) * src_fps and caches caps per-chunk so big sources open only the chunk the playhead touches. Scrub benefits too. _prime_segments now captures src_fps. Tests: 24 new, all passing. Full required suite 64/64 green."
  - date: 2026-04-22
    description: "M12 task-43 complete — Timeline render-state UI bar + useRenderState hook (polls /render-state every 2s; will switch to WS push once task-37 lands). Virtualized (only visible buckets as DOM). Colors per user pref: dark-red / bright-red / blue / dark-red-striped. Backend plumbing: BackgroundRenderer.state property, RenderCoordinator.invalidate_ranges_in_background, cache_invalidation nudges bg requeue."
  - date: 2026-04-22
    description: "M12 task-42 complete — render-state tracking + /render-state HTTP snapshot. render_state.build_snapshot derives bucket states from fragment cache + bg queue. _DeltaDispatcher coalesces transitions over 100ms for future WS push. Tests: 9 new, all passing."
  - date: 2026-04-22
    description: "M12 task-41 complete — background render worker. BackgroundRenderer with priority queue (distance from playhead), update_playhead/request_range/prime_around_playhead, shares encoder+lock with main worker (playback preempts via main_busy flag). Starts on play(), stops on stop(). Tests: 10 new, all passing."
  - date: 2026-04-22
    description: "M12 task-40 complete — backend fMP4 fragment cache. fragment_cache.py (LRU by count + bytes), worker checks cache before render (instant replay on hit), puts after encode, bumps encoder_generation on rebuild. cache_invalidation returns (frames, fragments) tuple; range invalidation hits both caches. /render-cache/stats includes fragment cache. Tests: 14 new, all passing."
  - date: 2026-04-22
    description: "M12 task-39 complete — 540p proxies. proxy_generator.py + ProxyCoordinator (bg transcodes), compositor prefer_proxy path, preview_scale_factor setting (configurable via settings.json, worker re-reads on invalidation and rebuilds encoder). Tests: 10 new, all passing."
  - date: 2026-04-22
    description: "M12 planning — NLE-style preview rendering pipeline. 5 tasks: 540p proxies, fragment cache, background renderer, render-state tracking, Timeline state-bar UI. Shifts preview from 'render realtime from source' to 'render in background, play from cache, show what's rendered'."
