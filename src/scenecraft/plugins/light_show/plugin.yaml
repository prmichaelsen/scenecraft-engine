name: light_show
version: 0.1.0
displayName: "Light Show"
description: "DMX-simulated light show authoring: rig fixtures, 3D preview, chat-driven rig editing."
publisher: scenecraft
license: MIT

# Convention (matches isolate_vocals, generate_music):
#   • Internal ids use dot notation (e.g. `light_show.reset_rig`).
#   • Chat tool names use double underscore (e.g. `light_show__set_rig_layout`)
#     because Claude's tool-name regex forbids dots.
#
# MVP scope:
#   • No timeline integration — universes are simulated, rendered in 3D only.
#   • No real DMX output (Art-Net / sACN / OLA) — sim-only.
#   • No scene DSL / GDTF / MVR yet — fixtures are a flat role + position table.
#   • Scenes run frontend-side as plain TS functions for now; backend owns
#     only the rig (fixtures) until scenes / tracks / transitions land.

activationEvents:
  - onStartup

contributes:
  mcpTools:
    - id: set_rig_layout
      description: |
        Upsert fixture positions, rotations, role, and label in bulk.
        Partial-state semantics: each fixture MUST have an id; other fields
        are optional and omitted fields preserve current values. Unknown
        ids create new fixtures (defaulting to zero position/rotation and
        role='par' if role is not provided). Returns the full rig after
        the upsert.
      handler: "backend:tools_set_rig_layout"
      input_schema:
        type: object
        required: [fixtures]
        properties:
          fixtures:
            type: array
            description: List of fixture objects. Each must have an id.
            items:
              type: object
              required: [id]
              properties:
                id: { type: string }
                role: { type: string, enum: ["moving_head", "par"] }
                label: { type: string }
                position_x: { type: number }
                position_y: { type: number }
                position_z: { type: number }
                rotation_x: { type: number }
                rotation_y: { type: number }
                rotation_z: { type: number }

    - id: list_fixtures
      description: |
        Read back the full current rig as a list of fixture objects with
        id, role, label, position (xyz meters), and rotation (xyz radians).
      handler: "backend:tools_list_fixtures"
      input_schema:
        type: object
        properties: {}

    - id: reset_rig
      description: |
        Delete all fixtures and re-seed the default 8-fixture rig (4 moving
        heads upstage truss + 4 RGB wash pars downstage front). Returns the
        full rig after the reset. Use this to recover from a broken rig
        authored via set_rig_layout.
      handler: "backend:tools_reset_rig"
      destructive: true
      input_schema:
        type: object
        properties: {}

    - id: remove_fixtures
      description: |
        Delete specific fixtures by id. Missing ids are silently ignored.
        Returns the full rig after removal.
      handler: "backend:tools_remove_fixtures"
      destructive: true
      input_schema:
        type: object
        required: [ids]
        properties:
          ids:
            type: array
            items: { type: string }

    - id: set_fixture_state
      description: |
        Override per-fixture channel values (intensity, color, pan, tilt).
        Overrides win over whatever the active scene would otherwise write,
        so you can pin a specific fixture to a specific look regardless of
        scene choice. Each entry MUST include `id`; any of intensity/color/
        pan/tilt may be specified — omitted fields preserve current override
        state (or stay scene-driven if not previously overridden). Use
        `clear_overrides` to restore scene control.

        Coordinate notes:
          - intensity: 0.0 (off) to 1.0 (full).
          - color: [r, g, b] each 0.0..1.0 (linear). Set all three or none.
          - pan: radians; signed offset from fixture's base rotation. Only
            meaningful for moving_head role.
          - tilt: radians; signed offset. Only meaningful for moving_head.
      handler: "backend:tools_set_fixture_state"
      input_schema:
        type: object
        required: [overrides]
        properties:
          overrides:
            type: array
            items:
              type: object
              required: [id]
              properties:
                id: { type: string }
                intensity: { type: number, minimum: 0, maximum: 1 }
                color:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items: { type: number, minimum: 0, maximum: 1 }
                pan: { type: number }
                tilt: { type: number }

    - id: list_overrides
      description: |
        List current per-fixture channel overrides. Each returned entry has
        `fixture_id` and zero or more channel keys (intensity, color, pan,
        tilt) — present only when that channel is currently overridden.
      handler: "backend:tools_list_overrides"
      input_schema:
        type: object
        properties: {}

    - id: clear_overrides
      description: |
        Clear channel overrides, returning affected fixtures to scene-driven
        channel values. If `ids` is provided, only those fixtures are
        cleared; otherwise ALL overrides are cleared. Non-destructive on
        the rig itself — only removes the override layer.
      handler: "backend:tools_clear_overrides"
      input_schema:
        type: object
        properties:
          ids:
            type: array
            items: { type: string }

    - id: screens
      description: |
        Manage video screens in the 3D preview. Single action-dispatched
        tool — use the `action` field to pick the operation.

        Screens are flat rectangular panels rendered as textured planes.
        At MVP every screen shows the same scenecraft main-timeline frame
        preview at the unified playhead; per-screen timelines are a
        follow-up feature.

        Actions:
          - "list": return the current screens.
          - "set": bulk upsert. Each entry MUST have an `id`; any other
            field is optional and partial — omitted fields preserve
            existing values, unknown ids create new screens (defaulting
            to a 4m x 2.25m panel at the origin).
          - "remove": delete screens by `ids`.
          - "reset": delete ALL screens (destructive). Screens start
            empty per project — no defaults are re-seeded.

        Coordinate notes:
          - position: meters (x = stage right, y = up, z = downstage is
            negative, matching the fixture coord system).
          - rotation: radians (Euler XYZ).
          - width / height: meters. The plane faces +Z by default;
            rotate to face the audience (typical backdrop: y=2, z=-4,
            rotation_y=0 faces the viewer at z=0).
      handler: "backend:tools_screens"
      destructive: true  # `reset` and `remove` are destructive; flag conservatively
      input_schema:
        type: object
        required: [action]
        properties:
          action:
            type: string
            enum: [list, set, remove, reset]
            description: Operation to perform.
          screens:
            type: array
            description: For `set` — list of screen upserts. Each needs an `id`.
            items:
              type: object
              required: [id]
              properties:
                id: { type: string }
                label: { type: string }
                position_x: { type: number }
                position_y: { type: number }
                position_z: { type: number }
                rotation_x: { type: number }
                rotation_y: { type: number }
                rotation_z: { type: number }
                width: { type: number, minimum: 0 }
                height: { type: number, minimum: 0 }
          ids:
            type: array
            description: For `remove` — screen ids to delete.
            items: { type: string }
